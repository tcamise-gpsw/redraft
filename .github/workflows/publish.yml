name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch

jobs:
  publish:
    name: Bump, build, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # push version commit + tag

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          # Use a PAT so the version-bump push triggers downstream workflows.
          # Falls back to GITHUB_TOKEN if WORKFLOW_TOKEN is not set (push will
          # not re-trigger CI in that case, which is acceptable for a release).
          token: ${{ secrets.WORKFLOW_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org # wires NODE_AUTH_TOKEN → .npmrc

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: npm version ${{ inputs.bump }} --no-git-tag-version

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit, tag, and push
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json
          git commit -m "chore(publish): release v${VERSION}"
          git tag "v${VERSION}"
          git push origin main "v${VERSION}"
