name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch

jobs:
  publish:
    name: Bump, build, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # push version commit + tag, create GitHub release
      id-token: write # OIDC token for npm trusted publishing

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0 # git describe needs full tag history
          # PAT so the version-bump push can re-trigger CI; falls back to GITHUB_TOKEN.
          token: ${{ secrets.WORKFLOW_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify trusted publishing toolchain
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci
      - name: Require bypass token for protected main pushes
        env:
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: |
          if [ -z "$WORKFLOW_TOKEN" ]; then
            echo "WORKFLOW_TOKEN secret is required for release pushes to protected main."
            echo "Add a PAT for a user on the branch-rule bypass list, then rerun."
            exit 1
          fi
          git remote set-url origin "https://x-access-token:${WORKFLOW_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: npm version ${{ inputs.bump }} --no-git-tag-version

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public

      - name: Commit, tag, and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")

          git add package.json package-lock.json
          git commit -m "chore(publish): release v${VERSION}"
          git tag "v${VERSION}"

          # Commits between the previous release tag and this one,
          # excluding the version-bump commit itself (v${VERSION}^).
          PREV=$(git describe --tags --abbrev=0 "v${VERSION}^" 2>/dev/null || echo "")
          RANGE="${PREV:+${PREV}..}v${VERSION}^"

          # Group by conventional-commit type prefix.
          notes_file=$(mktemp)

          section() {
            local title="$1" pat="$2"
            local lines
            lines=$(git log "$RANGE" --no-merges --pretty=format:"- %s (\`%h\`)" \
              | grep -E "^- ${pat}" || true)
            if [ -n "$lines" ]; then
              {
                printf "### %s\n" "$title"
                printf "%s\n\n" "$lines"
              } >> "$notes_file"
            fi
          }

          section '🚀 Features' 'feat[:(]'
          section '🐛 Bug Fixes' 'fix[:(]'
          section '⚡ Performance' 'perf[:(]'
          section '📚 Documentation' 'docs[:(]'
          section '♻️  Refactoring' 'refactor[:(]'
          section '🔧 Build & CI' '(build|ci)[:(]'
          section '🧹 Chores' 'chore[:(]'

          if [ ! -s "$notes_file" ]; then
            printf '_No categorized changes._\n' > "$notes_file"
          fi

          git push origin main "v${VERSION}"

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file "$notes_file" \
            --latest
